<form method="post" class="record status-{{ record.status }}">
  <input type="hidden" name="record_id" value="{{ record.id }}">
  <div>
    <strong>{{ record.cadet }}</strong>
    <span>{{ record.items_text }}</span>
    <small>Pickup {{ record.pickup_date }} | Return {{ record.return_date }}</small>
    {% if record.missing_items %}<small>Missing: {{ record.missing_items }}</small>{% endif %}
  </div>
  <label class="checkbox"><input type="checkbox" name="staff_confirmed" {% if record.staff_confirmed %}checked{% endif %}> Returned</label>
  <label class="checkbox"><input type="checkbox" name="staff_issue" {% if record.staff_issue %}checked{% endif %}> Broken, missing, or misplaced</label>
  <input name="staff_notes" value="{{ record.staff_notes }}" placeholder="Additional details">
  <button type="submit">Update</button>
</form>
